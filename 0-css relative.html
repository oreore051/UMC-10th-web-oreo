<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Border vs Outline 실습</title>
    <style>
        body {
            display: flex;
            gap: 100px;
            padding: 50px;
            font-family: sans-serif;
        }

        .container {
            text-align: center;
        }

        .box {
            width: 200px;
            height: 100px;
            background-color: #add8e6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            
            /* 실습 설정값 */
            border: 20px solid #4169e1;   /* RoyalBlue */
            outline: 20px solid #ff7f50;  /* Coral */
            margin-bottom: 20px;
        }

        /* 1. 콘텐츠 영역을 기준으로 크기 계산 (기본값) */
        .content-box {
            box-sizing: content-box;
        }

        /* 2. 테두리를 포함하여 전체 크기 계산 */
        .border-box {
            box-sizing: border-box;
        }

        .description {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Content Box</h2>
        <div class="box content-box">200 x 100</div>
        <div class="description">
            전체 너비: 240px<br>
            (200 + border 40)<br>
            <strong>Outline은 크기에 미포함</strong>
        </div>
    </div>

    <div class="container">
        <h2>Border Box</h2>
        <div class="box border-box">200 x 100</div>
        <div class="description">
            전체 너비: 200px<br>
            (내부 콘텐츠가 줄어듦)<br>
            <strong>Outline은 여전히 미포함</strong>
        </div>
    </div>

</body>
</html>
